<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tennis Ladder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }

    header {
      background: #1a5276;
      color: white;
      padding: 16px 24px;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 16px 24px 0;
      border-bottom: 2px solid #ddd;
      background: white;
    }
    .tab {
      padding: 10px 24px;
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      border: 1px solid transparent;
      border-bottom: none;
      font-weight: 500;
      color: #555;
      background: #f0f0f0;
    }
    .tab.active {
      background: white;
      border-color: #ddd;
      color: #1a5276;
      margin-bottom: -2px;
      border-bottom: 2px solid white;
    }

    .toolbar {
      background: white;
      border-bottom: 1px solid #ddd;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toolbar.hidden { display: none; }
    .search-wrap { position: relative; }
    .search-wrap input {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
      width: 240px;
      outline: none;
    }
    .search-wrap input:focus { border-color: #1a5276; }
    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #ccc;
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .suggestions.open { display: block; }
    .suggestion { padding: 8px 12px; cursor: pointer; font-size: 0.9rem; }
    .suggestion:hover { background: #eaf2fb; }
    .clear-btn {
      padding: 8px 14px;
      background: #e0e0e0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #444;
      display: none;
    }
    .clear-btn.visible { display: inline-block; }
    .timestamp { margin-left: auto; font-size: 0.78rem; color: #999; }

    .content { padding: 24px; max-width: 1200px; margin: 0 auto; }

    .player-card {
      background: white;
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      gap: 32px;
      align-items: center;
      flex-wrap: wrap;
    }
    .player-name { font-size: 1.3rem; font-weight: 700; color: #1a5276; flex: 1; min-width: 150px; }
    .stat { text-align: center; }
    .stat-value { font-size: 1.6rem; font-weight: 700; color: #1a5276; }
    .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-promotion { background: #d5f5e3; color: #1e8449; }
    .badge-relegation { background: #fadbd8; color: #c0392b; }
    .badge-pool { background: #fef9e7; color: #7d6608; }
    .badge-ltp { background: #f0f0f0; color: #666; }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 24px 0 12px;
      color: #1a5276;
      border-left: 4px solid #1a5276;
      padding-left: 10px;
    }
    .sub-section {
      font-size: 0.85rem;
      font-weight: 600;
      margin: 16px 0 6px;
      color: #888;
      padding-left: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .table-wrap { overflow-x: auto; }

    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      font-size: 0.88rem;
    }
    th {
      background: #1a5276;
      color: white;
      text-align: left;
      padding: 10px 12px;
      white-space: nowrap;
      font-weight: 500;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { background: #154360; }
    th.sort-asc::after { content: ' ▲'; font-size: 0.7em; }
    th.sort-desc::after { content: ' ▼'; font-size: 0.7em; }
    td { padding: 8px 12px; border-bottom: 1px solid #eee; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) td { background: #f9f9f9; }
    tr:hover td { background: #eaf2fb; }
    tr.highlight td { background: #fef9e7 !important; font-weight: 600; }
    tr.section-divider td { background: #f0f4f8; color: #666; font-size: 0.8rem;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 12px; }
    td.win { color: #1e8449; font-weight: 600; }
    td.loss { color: #c0392b; }
    td.draw { color: #7d6608; font-weight: 600; }
    td.cancelled { color: #999; font-style: italic; }
    tr.cancelled-row td { color: #aaa; }
    tr.paused-row td { background: #f0f4ff !important; color: #555; font-style: italic; }
    td.paused-label { color: #5c6bc0; font-style: italic; }
    td.player-link { cursor: pointer; }
    td.player-link:hover { background: #d6eaf8 !important; }
    th.col-narrow, td.col-narrow { width: 2em; max-width: 2em; text-align: center; padding: 8px 2px; }

    .rules-content {
      background: white;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      line-height: 1.7;
      font-size: 0.9rem;
      white-space: pre-wrap;
      max-height: 70vh;
      overflow-y: auto;
    }

    .loading { padding: 40px; text-align: center; color: #888; }
    .error { padding: 20px; color: #c0392b; background: #fdecea; border-radius: 6px; }
  </style>
</head>
<body>

<header>🎾 Tennis Ladder</header>

<div class="tabs" id="tabs"></div>

<div class="toolbar" id="toolbar">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search player…" autocomplete="off">
    <div class="suggestions" id="suggestions"></div>
  </div>
  <button class="clear-btn" id="clearBtn" onclick="clearPlayer()">✕ Clear</button>
  <span class="timestamp" id="timestamp"></span>
</div>

<div class="content" id="content">
  <div class="loading">Loading...</div>
</div>

<script>
const SHEET_ID = '1qNg4ZjAMNY9-KRWO0LpbXUckdHlXwrfaPr24-d9ewTc';
const LADDER_SHEETS = ['Ladder 3', 'Ladder 4', 'Ladder 5'];

// Column indices (0-based)
const RANK_COLS  = { start: 0,  end: 15 };  // A–P
const MATCH_COLS = { start: 25, end: 29 };  // Z–AD

// Within rank slice:  0=zone(P/R), 1=pos, 2=name, 3=canChallenge, 4=canReceive
// Within match slice: 0=challengeDate, 1=matchDate, 2=challenger, 3=opponent, 4=winner
const RANK_NAME_COL    = 2;
const MATCH_CHALLENGER = 2;
const MATCH_OPPONENT   = 3;
const MATCH_WINNER     = 4;

const HEADER_ROW = 1;  // spreadsheet row 2
const DATA_START = 2;  // spreadsheet row 3

// Labels in col C that are metadata, not player names
const META_LABELS = new Set([
  'md ok', 'cd ok', 'cd ok ', 'not ok', 'paused', 'ltp', 'new player pool',
  'l3 players', 'l4 players', 'l5 players',
  'l3 challenges', 'l4 challenges', 'l5 challenges',
  'l3 games / player', 'l4 games / player', 'l5 games / player',
]);

const cache = {};
let currentSheet = LADDER_SHEETS[0];
let currentPlayer = null;

function csvUrl(sheet) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}`;
}

function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQ && text[i+1] === '"') { cell += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      row.push(cell); cell = '';
    } else if ((ch === '\n' || ch === '\r') && !inQ) {
      row.push(cell); cell = '';
      if (row.some(c => c)) rows.push(row);
      row = [];
      if (ch === '\r' && text[i+1] === '\n') i++;
    } else {
      cell += ch;
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

function sliceCols(rows, colStart, colEnd) {
  return rows.map(r => r.slice(colStart, colEnd + 1));
}

// Parse "1-Jan", "13 January", "1 Jan" → sortable number (month*100+day), null if unparseable
function parseMatchDate(str) {
  if (!str || !str.trim()) return null;
  const MONTHS = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  const m = str.trim().toLowerCase().replace(/[-]+/, ' ').match(/^(\d+)\s+([a-z]+)/);
  if (!m) return null;
  const mon = MONTHS[m[2].slice(0,3)];
  return mon ? mon * 100 + parseInt(m[1]) : null;
}

// Parse sheet rows into { mainPlayers, poolPlayers, ltpPlayers, validMatches, headers_rank, headers_match }
function parseSheetData(rows) {
  const rankSlice  = sliceCols(rows, RANK_COLS.start,  RANK_COLS.end);
  const matchSlice = sliceCols(rows, MATCH_COLS.start, MATCH_COLS.end);

  const headers_rank  = rankSlice[HEADER_ROW]  || [];
  const headers_match = matchSlice[HEADER_ROW] || [];

  const mainPlayers = [], poolPlayers = [], ltpPlayers = [];
  let section = 'main';

  rankSlice.slice(DATA_START).forEach(row => {
    const pos  = (row[1] || '').trim();
    const name = (row[RANK_NAME_COL] || '').trim();
    if (!name) return;

    const nl = name.toLowerCase();
    if (nl === 'new player pool') { section = 'pool'; return; }
    if (nl === 'ltp')             { section = 'ltp';  return; }
    if (META_LABELS.has(nl))      { return; }

    if      (section === 'pool')         poolPlayers.push(row);
    else if (section === 'ltp')          ltpPlayers.push(row);
    else if (/^\d+$/.test(pos))          mainPlayers.push(row);
  });

  // Matches: only rows with real challenger + opponent
  const validMatches = matchSlice.slice(DATA_START).filter(r =>
    (r[MATCH_CHALLENGER] || '').trim() && (r[MATCH_OPPONENT] || '').trim()
  );

  return { mainPlayers, poolPlayers, ltpPlayers, validMatches, headers_rank, headers_match };
}

// Build a ranking table for a single section of players
function makeRankTable(headers, rows, highlightName) {
  const colCount = headers.length;
  const usedCols = [];
  for (let c = 0; c < colCount; c++) {
    if (headers[c] || rows.some(r => r[c])) usedCols.push(c);
  }

  const CHALLENGE_COLS = new Set();
  usedCols.forEach(c => {
    const h = (headers[c] || '').toLowerCase();
    if (h.includes('challeng') || h.includes('receiv')) CHALLENGE_COLS.add(c);
  });
  function shortHeader(h) {
    const l = h.toLowerCase();
    if (l.includes('receiv')) return 'Rcv?';
    if (l.includes('challeng')) return 'Ch?';
    return h;
  }

  const t = document.createElement('table');
  const thead = t.createTHead();
  const hr = thead.insertRow();
  usedCols.forEach(c => {
    const th = document.createElement('th');
    th.textContent = shortHeader(headers[c] || '');
    if (CHALLENGE_COLS.has(c)) th.className = 'col-narrow';
    hr.appendChild(th);
  });

  const tbody = t.createTBody();
  rows.forEach(row => {
    const tr = tbody.insertRow();
    if (highlightName && (row[RANK_NAME_COL] || '').trim() === highlightName) tr.classList.add('highlight');
    usedCols.forEach(c => {
      const td = tr.insertCell();
      td.textContent = row[c] || '';
      if (c === RANK_NAME_COL && row[c]) {
        td.className = 'player-link';
        td.onclick = () => selectPlayer(row[c].trim());
      }
      if (CHALLENGE_COLS.has(c)) {
        td.className = 'col-narrow';
        const val = (row[c] || '').trim().toLowerCase();
        if (val === 'yes') td.textContent = '✅';
        else if (val === 'no') td.textContent = '❌';
      }
    });
  });

  return t;
}

// Set a player name cell with rank superscript and click handler
function setPlayerCell(td, name, rankMap) {
  td.textContent = '';
  td.className = 'player-link';
  td.onclick = () => selectPlayer(name);
  td.appendChild(document.createTextNode(name));
  const rank = rankMap && rankMap.get(name.toLowerCase());
  if (rank) {
    const sup = document.createElement('sup');
    sup.textContent = rank;
    sup.style.cssText = 'font-size:0.72em;color:#999;margin-left:2px;font-style:normal;';
    td.appendChild(sup);
  }
}

// Build match table with optional sort and rank superscripts
function makeMatchTable(headers, rows, playerName, rankMap) {
  const usedCols = [];
  for (let c = 0; c < headers.length; c++) {
    if (headers[c] || rows.some(r => r[c])) usedCols.push(c);
  }

  let sortCol = null, sortDir = 1;
  let sortedRows = [...rows];

  const t = document.createElement('table');
  const thead = t.createTHead();
  const hr = thead.insertRow();
  const ths = [];
  usedCols.forEach((c, i) => {
    const th = document.createElement('th');
    th.textContent = headers[c] || '';
    // Make first two columns (challenge date, match date) sortable
    if (i < 2) {
      th.classList.add('sortable');
      th.addEventListener('click', () => {
        if (sortCol === c) sortDir = -sortDir;
        else { sortCol = c; sortDir = 1; }
        ths.forEach((h, j) => {
          h.classList.remove('sort-asc', 'sort-desc');
          if (j < 2 && usedCols[j] === sortCol) h.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
        });
        sortedRows.sort((a, b) => {
          const da = parseMatchDate(a[c]);
          const db = parseMatchDate(b[c]);
          if (da === null && db === null) return 0;
          if (da === null) return sortDir;
          if (db === null) return -sortDir;
          return (da - db) * sortDir;
        });
        rebuildBody();
      });
    }
    hr.appendChild(th);
    ths.push(th);
  });

  const tbody = t.createTBody();

  function rebuildBody() {
    tbody.innerHTML = '';
    sortedRows.forEach(row => {
      if (!row.some(c => c)) return;
      const challenger = (row[MATCH_CHALLENGER] || '').trim();
      const opponent   = (row[MATCH_OPPONENT]   || '').trim();
      const isPaused   = challenger && challenger.toLowerCase() === opponent.toLowerCase();

      const tr = tbody.insertRow();
      if (isPaused) tr.classList.add('paused-row');

      usedCols.forEach(c => {
        const td = tr.insertCell();
        td.textContent = row[c] || '';

        if (isPaused) {
          if (c === MATCH_WINNER) {
            td.textContent = 'Paused';
            td.className = 'paused-label';
          } else if (c === MATCH_OPPONENT) {
            td.textContent = '—';
          } else if (c === MATCH_CHALLENGER && challenger) {
            setPlayerCell(td, challenger, rankMap);
          }
          return;
        }

        if (c === MATCH_WINNER && row[c]) {
          const winner        = row[c].trim().toLowerCase();
          const challengerLC  = challenger.toLowerCase();
          const opponentLC    = opponent.toLowerCase();
          const isValidWinner = winner === challengerLC || winner === opponentLC;
          if (winner === 'draw') {
            td.className = 'draw';
          } else if (!isValidWinner) {
            td.className = 'cancelled';
            tr.classList.add('cancelled-row');
          } else if (playerName) {
            td.className = winner === playerName.trim().toLowerCase() ? 'win' : 'loss';
          }
        }
        if ((c === MATCH_CHALLENGER || c === MATCH_OPPONENT) && row[c]) {
          setPlayerCell(td, row[c].trim(), rankMap);
        }
      });
    });
  }

  rebuildBody();
  return t;
}

async function loadSheet(name) {
  if (cache[name]) return cache[name];
  const resp = await fetch(csvUrl(name));
  if (!resp.ok) throw new Error(`Failed to load ${name}: ${resp.status}`);
  const text = await resp.text();
  cache[name] = parseCSV(text);
  return cache[name];
}

function getPlayerNames(parsed) {
  const { mainPlayers, poolPlayers, ltpPlayers } = parsed;
  return [...mainPlayers, ...poolPlayers, ...ltpPlayers]
    .map(r => (r[RANK_NAME_COL] || '').trim())
    .filter(Boolean);
}

function computeStats(parsed, playerName) {
  const { mainPlayers, poolPlayers, ltpPlayers, validMatches } = parsed;
  const name = playerName.trim().toLowerCase();

  const allPlayers = [...mainPlayers, ...poolPlayers, ...ltpPlayers];
  const rankRow = allPlayers.find(r => (r[RANK_NAME_COL] || '').trim().toLowerCase() === name);
  const position = rankRow ? (rankRow[1] || '—') : '—';
  const zone = rankRow ? rankRow[0] : '';

  const isPool = poolPlayers.some(r => (r[RANK_NAME_COL] || '').trim().toLowerCase() === name);
  const isLTP  = ltpPlayers.some( r => (r[RANK_NAME_COL] || '').trim().toLowerCase() === name);

  let wins = 0, losses = 0, draws = 0;
  const allPlayerMatches = validMatches.filter(r => {
    const ch = (r[MATCH_CHALLENGER] || '').trim().toLowerCase();
    const op = (r[MATCH_OPPONENT]   || '').trim().toLowerCase();
    return ch === name || op === name;
  });
  const scoredMatches = allPlayerMatches.filter(r => {
    const w  = (r[MATCH_WINNER]     || '').trim().toLowerCase();
    const ch = (r[MATCH_CHALLENGER] || '').trim().toLowerCase();
    const op = (r[MATCH_OPPONENT]   || '').trim().toLowerCase();
    if (ch === op) return false; // paused rows don't count
    return !w || w === 'draw' || w === ch || w === op;
  });
  scoredMatches.forEach(r => {
    const w = (r[MATCH_WINNER] || '').trim().toLowerCase();
    if (!w) return;
    if (w === 'draw') draws++;
    else if (w === name) wins++;
    else losses++;
  });

  return { position, zone, isPool, isLTP, wins, losses, draws, matches: allPlayerMatches };
}

async function showSheet(name, player) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading ' + name + '…</div>';
  try {
    const rows = await loadSheet(name);
    const parsed = parseSheetData(rows);

    document.getElementById('timestamp').textContent =
      'Loaded ' + new Date().toLocaleTimeString();

    // Build rank map: lowercase name → position string
    const rankMap = new Map();
    parsed.mainPlayers.forEach(r => {
      const n = (r[RANK_NAME_COL] || '').trim();
      const p = (r[1] || '').trim();
      if (n && p) rankMap.set(n.toLowerCase(), p);
    });

    content.innerHTML = '';

    if (player) {
      const stats = computeStats(parsed, player);
      const total = stats.wins + stats.losses + stats.draws;
      const winPct = total ? Math.round(stats.wins / total * 100) : 0;

      let badge = '';
      if (stats.isPool) badge = '<span class="badge badge-pool">New Player Pool</span>';
      else if (stats.isLTP) badge = '<span class="badge badge-ltp">Long Term Pause</span>';
      else if (stats.zone === 'P') badge = '<span class="badge badge-promotion">Promotion</span>';
      else if (stats.zone === 'R') badge = '<span class="badge badge-relegation">Relegation</span>';

      const card = document.createElement('div');
      card.className = 'player-card';
      card.innerHTML = `
        <div class="player-name">${player} ${badge}</div>
        <div class="stat"><div class="stat-value">#${stats.position}</div><div class="stat-label">Position</div></div>
        <div class="stat"><div class="stat-value">${total}</div><div class="stat-label">Played</div></div>
        <div class="stat"><div class="stat-value" style="color:#1e8449">${stats.wins}</div><div class="stat-label">Wins</div></div>
        <div class="stat"><div class="stat-value" style="color:#c0392b">${stats.losses}</div><div class="stat-label">Losses</div></div>
        ${stats.draws ? `<div class="stat"><div class="stat-value" style="color:#7d6608">${stats.draws}</div><div class="stat-label">Draws</div></div>` : ''}
        <div class="stat"><div class="stat-value">${winPct}%</div><div class="stat-label">Win rate</div></div>
      `;
      content.appendChild(card);

      addSection(content, 'Matches', makeMatchTable(parsed.headers_match, stats.matches, player, rankMap));
      addSection(content, 'Full Rankings', makeRankTable(parsed.headers_rank, parsed.mainPlayers, player));
      if (parsed.poolPlayers.length) addSection(content, 'New Player Pool', makeRankTable(parsed.headers_rank, parsed.poolPlayers, player));
      if (parsed.ltpPlayers.length)  addSection(content, 'Long Term Pause',  makeRankTable(parsed.headers_rank, parsed.ltpPlayers,  player));

    } else {
      addSection(content, 'Rankings', makeRankTable(parsed.headers_rank, parsed.mainPlayers, null));
      if (parsed.poolPlayers.length) addSection(content, 'New Player Pool', makeRankTable(parsed.headers_rank, parsed.poolPlayers, null));
      if (parsed.ltpPlayers.length)  addSection(content, 'Long Term Pause',  makeRankTable(parsed.headers_rank, parsed.ltpPlayers,  null));
      addSection(content, 'Matches', makeMatchTable(parsed.headers_match, parsed.validMatches, null, rankMap));
    }

    updatePlayerList(getPlayerNames(parsed));

  } catch (e) {
    content.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  }
}

async function showRules() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading rules…</div>';
  try {
    const rows = await loadSheet('Overview');
    const text = (rows[0] && rows[0][0]) ? rows[0][0] : 'Rules not found.';
    // Split on known section headings for readability
    const formatted = text
      .replace(/([A-Z][a-z]+ [A-Z][a-z]+|[A-Z]{2,}[^.!?]*)\s+(?=[A-Z])/g, '$1\n\n')
      .trim();
    content.innerHTML = '';
    const h = document.createElement('div');
    h.className = 'section-title';
    h.textContent = 'Rules & Overview';
    content.appendChild(h);
    const div = document.createElement('div');
    div.className = 'rules-content';
    div.textContent = text;
    content.appendChild(div);
  } catch (e) {
    content.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  }
}

function addSection(parent, title, table) {
  const h = document.createElement('div');
  h.className = 'section-title';
  h.textContent = title;
  parent.appendChild(h);
  const w = document.createElement('div');
  w.className = 'table-wrap';
  w.appendChild(table);
  parent.appendChild(w);
}

// ---- Autocomplete ----
let allPlayers = [];

function updatePlayerList(names) {
  allPlayers = names;
}

function showSuggestions(query) {
  const box = document.getElementById('suggestions');
  if (!query) { box.classList.remove('open'); return; }
  const matches = allPlayers.filter(p => p.toLowerCase().includes(query.toLowerCase()));
  if (!matches.length) { box.classList.remove('open'); return; }
  box.innerHTML = '';
  matches.forEach(p => {
    const d = document.createElement('div');
    d.className = 'suggestion';
    d.textContent = p;
    d.onmousedown = () => selectPlayer(p);
    box.appendChild(d);
  });
  box.classList.add('open');
}

function selectPlayer(name) {
  currentPlayer = name;
  document.getElementById('search').value = name;
  document.getElementById('suggestions').classList.remove('open');
  document.getElementById('clearBtn').classList.add('visible');
  showSheet(currentSheet, name);
}

function clearPlayer() {
  currentPlayer = null;
  document.getElementById('search').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  showSheet(currentSheet, null);
}

document.getElementById('search').addEventListener('input', e => showSuggestions(e.target.value));
document.getElementById('search').addEventListener('blur', () => {
  setTimeout(() => document.getElementById('suggestions').classList.remove('open'), 150);
});
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Escape') clearPlayer();
  if (e.key === 'Enter') {
    const first = document.querySelector('.suggestion');
    if (first) selectPlayer(first.textContent);
  }
});

// ---- Tabs ----
function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  const toolbar = document.getElementById('toolbar');

  LADDER_SHEETS.forEach((name, i) => {
    const btn = document.createElement('div');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentSheet = name;
      currentPlayer = null;
      document.getElementById('search').value = '';
      document.getElementById('clearBtn').classList.remove('visible');
      toolbar.classList.remove('hidden');
      showSheet(name, null);
    };
    tabsEl.appendChild(btn);
  });

  // Rules tab
  const rulesBtn = document.createElement('div');
  rulesBtn.className = 'tab';
  rulesBtn.textContent = 'Rules';
  rulesBtn.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    rulesBtn.classList.add('active');
    toolbar.classList.add('hidden');
    showRules();
  };
  tabsEl.appendChild(rulesBtn);
}

buildTabs();
showSheet(currentSheet, null);
</script>
