<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tennis Ladder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }

    header {
      background: #1a5276;
      color: white;
      padding: 16px 24px;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 16px 24px 0;
      border-bottom: 2px solid #ddd;
      background: white;
    }
    .tab {
      padding: 10px 24px;
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      border: 1px solid transparent;
      border-bottom: none;
      font-weight: 500;
      color: #555;
      background: #f0f0f0;
    }
    .tab.active {
      background: white;
      border-color: #ddd;
      color: #1a5276;
      margin-bottom: -2px;
      border-bottom: 2px solid white;
    }

    .toolbar {
      background: white;
      border-bottom: 1px solid #ddd;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-wrap { position: relative; }
    .search-wrap input {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
      width: 240px;
      outline: none;
    }
    .search-wrap input:focus { border-color: #1a5276; }
    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #ccc;
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .suggestions.open { display: block; }
    .suggestion {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .suggestion:hover, .suggestion.selected { background: #eaf2fb; }
    .clear-btn {
      padding: 8px 14px;
      background: #e0e0e0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #444;
      display: none;
    }
    .clear-btn.visible { display: inline-block; }

    .content { padding: 24px; max-width: 1200px; margin: 0 auto; }

    .player-card {
      background: white;
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      gap: 32px;
      align-items: center;
      flex-wrap: wrap;
    }
    .player-name { font-size: 1.3rem; font-weight: 700; color: #1a5276; flex: 1; min-width: 150px; }
    .stat { text-align: center; }
    .stat-value { font-size: 1.6rem; font-weight: 700; color: #1a5276; }
    .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-paused { background: #d6eaf8; color: #1a5276; }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 24px 0 12px;
      color: #1a5276;
      border-left: 4px solid #1a5276;
      padding-left: 10px;
    }

    .table-wrap { overflow-x: auto; }

    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      font-size: 0.88rem;
    }
    th {
      background: #1a5276;
      color: white;
      text-align: left;
      padding: 10px 12px;
      white-space: nowrap;
      font-weight: 500;
    }
    td { padding: 8px 12px; border-bottom: 1px solid #eee; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) td { background: #f9f9f9; }
    tr:hover td { background: #eaf2fb; }
    tr.highlight td { background: #fef9e7 !important; font-weight: 600; }
    td.win { color: #1e8449; font-weight: 600; }
    td.loss { color: #c0392b; }
    td.player-link { cursor: pointer; }
    td.player-link:hover { background: #d6eaf8 !important; }

    .loading { padding: 40px; text-align: center; color: #888; }
    .error { padding: 20px; color: #c0392b; background: #fdecea; border-radius: 6px; }
  </style>
</head>
<body>

<header>🎾 Tennis Ladder</header>

<div class="tabs" id="tabs"></div>

<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search player…" autocomplete="off">
    <div class="suggestions" id="suggestions"></div>
  </div>
  <button class="clear-btn" id="clearBtn" onclick="clearPlayer()">✕ Clear</button>
</div>

<div class="content" id="content">
  <div class="loading">Loading...</div>
</div>

<script>
const SHEET_ID = '1qNg4ZjAMNY9-KRWO0LpbXUckdHlXwrfaPr24-d9ewTc';
const SHEETS = ['Ladder 3', 'Ladder 4', 'Ladder 5'];

// Column indices (0-based)
const RANK_COLS  = { start: 0,  end: 15 };  // A–P
const MATCH_COLS = { start: 25, end: 29 };  // Z–AD

// Within the rank slice:  0=paused, 1=pos, 2=name, 3=canChallenge, 4=canReceive, 5=challengesMade
// Within the match slice: 0=challengeDate, 1=matchDate, 2=challenger, 3=opponent, 4=winner
const RANK_NAME_COL  = 2;
const MATCH_CHALLENGER = 2;
const MATCH_OPPONENT   = 3;
const MATCH_WINNER     = 4;

const HEADER_ROW = 1;  // spreadsheet row 2
const DATA_START = 2;  // spreadsheet row 3

const cache = {};
let currentSheet = SHEETS[0];
let currentPlayer = null;

function csvUrl(sheet) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}`;
}

function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQ && text[i+1] === '"') { cell += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      row.push(cell); cell = '';
    } else if ((ch === '\n' || ch === '\r') && !inQ) {
      row.push(cell); cell = '';
      if (row.some(c => c)) rows.push(row);
      row = [];
      if (ch === '\r' && text[i+1] === '\n') i++;
    } else {
      cell += ch;
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

function slice(rows, colStart, colEnd) {
  return rows.map(r => r.slice(colStart, colEnd + 1));
}

function makeTable(headers, rows, highlightName) {
  const colCount = headers.length;
  const usedCols = [];
  for (let c = 0; c < colCount; c++) {
    if (headers[c] || rows.some(r => r[c])) usedCols.push(c);
  }

  const t = document.createElement('table');
  const thead = t.createTHead();
  const hr = thead.insertRow();
  usedCols.forEach(c => {
    const th = document.createElement('th');
    th.textContent = headers[c] || '';
    hr.appendChild(th);
  });

  const tbody = t.createTBody();
  rows.forEach(row => {
    if (!row.some(c => c)) return;
    const tr = tbody.insertRow();
    if (highlightName && row[RANK_NAME_COL] === highlightName) tr.classList.add('highlight');
    usedCols.forEach(c => {
      const td = tr.insertCell();
      td.textContent = row[c] || '';
      if (c === RANK_NAME_COL && row[c]) {
        td.className = 'player-link';
        td.onclick = () => selectPlayer(row[c].trim());
      }
    });
  });
  return t;
}

function makeMatchTable(headers, rows, playerName) {
  // headers and rows are already sliced to MATCH_COLS
  const usedCols = [];
  for (let c = 0; c < headers.length; c++) {
    if (headers[c] || rows.some(r => r[c])) usedCols.push(c);
  }

  const t = document.createElement('table');
  const thead = t.createTHead();
  const hr = thead.insertRow();
  usedCols.forEach(c => {
    const th = document.createElement('th');
    th.textContent = headers[c] || '';
    hr.appendChild(th);
  });

  const tbody = t.createTBody();
  rows.forEach(row => {
    if (!row.some(c => c)) return;
    const tr = tbody.insertRow();
    usedCols.forEach(c => {
      const td = tr.insertCell();
      td.textContent = row[c] || '';
      // colour winner column when filtering by player
      if (playerName && c === MATCH_WINNER && row[c]) {
        const won = row[c].trim().toLowerCase() === playerName.trim().toLowerCase();
        td.className = won ? 'win' : 'loss';
      }
      if ((c === MATCH_CHALLENGER || c === MATCH_OPPONENT) && row[c]) {
        td.className = 'player-link';
        td.onclick = () => selectPlayer(row[c].trim());
      }
    });
  });
  return t;
}

async function loadSheet(name) {
  if (cache[name]) return cache[name];
  const resp = await fetch(csvUrl(name));
  if (!resp.ok) throw new Error(`Failed to load ${name}: ${resp.status}`);
  const text = await resp.text();
  cache[name] = parseCSV(text);
  return cache[name];
}

function getPlayers(rows) {
  const names = [];
  const dataRows = slice(rows, RANK_COLS.start, RANK_COLS.end).slice(DATA_START);
  dataRows.forEach(row => {
    const name = (row[RANK_NAME_COL] || '').trim();
    if (name) names.push(name);
  });
  return names;
}

function computeStats(rankRows, matchRows, playerName) {
  const name = playerName.trim().toLowerCase();

  // ranking row
  const rankRow = rankRows.find(r => (r[RANK_NAME_COL] || '').trim().toLowerCase() === name);
  const position = rankRow ? rankRow[1] : '—';
  const paused = rankRow && rankRow[0] === 'P';

  // match stats
  let wins = 0, losses = 0;
  const playerMatches = matchRows.filter(r => {
    const challenger = (r[MATCH_CHALLENGER] || '').trim().toLowerCase();
    const opponent   = (r[MATCH_OPPONENT]   || '').trim().toLowerCase();
    return challenger === name || opponent === name;
  });
  playerMatches.forEach(r => {
    const winner = (r[MATCH_WINNER] || '').trim().toLowerCase();
    if (!winner) return;
    if (winner === name) wins++;
    else losses++;
  });

  return { position, paused, wins, losses, matches: playerMatches };
}

async function showSheet(name, player) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading ' + name + '…</div>';
  try {
    const rows = await loadSheet(name);
    const rankSlice  = slice(rows, RANK_COLS.start,  RANK_COLS.end);
    const matchSlice = slice(rows, MATCH_COLS.start, MATCH_COLS.end);

    const headers_rank  = rankSlice[HEADER_ROW]  || [];
    const headers_match = matchSlice[HEADER_ROW] || [];
    const data_rank     = rankSlice.slice(DATA_START);
    const data_match    = matchSlice.slice(DATA_START);

    content.innerHTML = '';

    if (player) {
      // --- Player view ---
      const stats = computeStats(data_rank, data_match, player);
      const total = stats.wins + stats.losses;
      const winPct = total ? Math.round(stats.wins / total * 100) : 0;

      const card = document.createElement('div');
      card.className = 'player-card';
      card.innerHTML = `
        <div class="player-name">${player}${stats.paused ? ' <span class="badge badge-paused">Paused</span>' : ''}</div>
        <div class="stat"><div class="stat-value">#${stats.position}</div><div class="stat-label">Position</div></div>
        <div class="stat"><div class="stat-value">${total}</div><div class="stat-label">Played</div></div>
        <div class="stat"><div class="stat-value" style="color:#1e8449">${stats.wins}</div><div class="stat-label">Wins</div></div>
        <div class="stat"><div class="stat-value" style="color:#c0392b">${stats.losses}</div><div class="stat-label">Losses</div></div>
        <div class="stat"><div class="stat-value">${winPct}%</div><div class="stat-label">Win rate</div></div>
      `;
      content.appendChild(card);

      addSection(content, 'Matches', makeMatchTable(headers_match, stats.matches, player));

      const rt = document.createElement('div');
      rt.className = 'section-title';
      rt.textContent = 'Full Rankings';
      content.appendChild(rt);
      const rw = document.createElement('div');
      rw.className = 'table-wrap';
      rw.appendChild(makeTable(headers_rank, data_rank, player));
      content.appendChild(rw);

    } else {
      // --- Default view ---
      addSection(content, 'Rankings', makeTable(headers_rank, data_rank));
      addSection(content, 'Matches',  makeMatchTable(headers_match, data_match, null));
    }

    // populate autocomplete with current sheet's players
    updatePlayerList(rows);

  } catch (e) {
    content.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  }
}

function addSection(parent, title, table) {
  const h = document.createElement('div');
  h.className = 'section-title';
  h.textContent = title;
  parent.appendChild(h);
  const w = document.createElement('div');
  w.className = 'table-wrap';
  w.appendChild(table);
  parent.appendChild(w);
}

// ---- Autocomplete ----
let allPlayers = [];

function updatePlayerList(rows) {
  allPlayers = getPlayers(rows);
}

function showSuggestions(query) {
  const box = document.getElementById('suggestions');
  if (!query) { box.classList.remove('open'); return; }
  const matches = allPlayers.filter(p => p.toLowerCase().includes(query.toLowerCase()));
  if (!matches.length) { box.classList.remove('open'); return; }
  box.innerHTML = '';
  matches.forEach(p => {
    const d = document.createElement('div');
    d.className = 'suggestion';
    d.textContent = p;
    d.onmousedown = () => selectPlayer(p);
    box.appendChild(d);
  });
  box.classList.add('open');
}

function selectPlayer(name) {
  currentPlayer = name;
  document.getElementById('search').value = name;
  document.getElementById('suggestions').classList.remove('open');
  document.getElementById('clearBtn').classList.add('visible');
  showSheet(currentSheet, name);
}

function clearPlayer() {
  currentPlayer = null;
  document.getElementById('search').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  showSheet(currentSheet, null);
}

document.getElementById('search').addEventListener('input', e => {
  showSuggestions(e.target.value);
});
document.getElementById('search').addEventListener('blur', () => {
  setTimeout(() => document.getElementById('suggestions').classList.remove('open'), 150);
});
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Escape') clearPlayer();
  if (e.key === 'Enter') {
    const first = document.querySelector('.suggestion');
    if (first) selectPlayer(first.textContent);
  }
});

// ---- Tabs ----
function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  SHEETS.forEach((name, i) => {
    const btn = document.createElement('div');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentSheet = name;
      currentPlayer = null;
      document.getElementById('search').value = '';
      document.getElementById('clearBtn').classList.remove('visible');
      showSheet(name, null);
    };
    tabsEl.appendChild(btn);
  });
}

buildTabs();
showSheet(currentSheet, null);
</script>
</body>
</html>
